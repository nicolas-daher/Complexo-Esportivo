name: CI/CD - Complexo Esportivo

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build ComplexoEsportivo.API/ComplexoEsportivo.API.csproj --configuration Release

      - name: Executar testes
        run: dotnet test ComplexoEsportivo.Tests/ComplexoEsportivo.Tests.csproj --configuration Release

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/complexo-esportivo:latest

      - name: Deploy
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/complexo-esportivo:latest
          docker run -d -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/complexo-esportivo:latest